<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXECUTE TRANSACTION - BLACK WALLET</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body { 
            background-color: #000000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        /* Efeito de grade de fundo */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(20, 20, 25, 0.4) 1px, transparent 1px),
            linear-gradient(90deg, rgba(20, 20, 25, 0.4) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        .transfer-wrapper { width: 100%; max-width: 440px; padding: 20px; }

        /* Barra de Status Superior */
        .system-status { 
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 10px; 
            color: #50AF95; text-transform: uppercase; letter-spacing: 2px; 
            margin-bottom: 20px; 
        }
        .status-indicator { display: flex; align-items: center; }
        .status-dot { 
            width: 6px; height: 6px; background-color: #50AF95; 
            border-radius: 50%; margin-right: 8px; 
            box-shadow: 0 0 8px #50AF95; animation: blink 2s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .module-card { 
            background: #050507; border: 1px solid #16181f; 
            padding: 40px; position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,1);
        }

        /* Linha de Scanner */
        .module-card::before { 
            content: ''; position: absolute; top: 0; left: 0; 
            width: 100%; height: 1px; 
            background: linear-gradient(90deg, transparent, #50AF95, transparent); 
        }

        .header-box { display: flex; align-items: center; margin-bottom: 35px; }
        .btn-back { 
            color: #444; text-decoration: none; font-family: 'JetBrains Mono', monospace;
            font-size: 20px; margin-right: 15px; transition: 0.3s;
        }
        .btn-back:hover { color: #50AF95; }

        h1 { 
            font-family: 'JetBrains Mono', monospace; font-size: 18px; 
            font-weight: 700; margin: 0; letter-spacing: 1px; 
        }

        /* Info do Remetente */
        .source-info { 
            background: rgba(255,255,255,0.02); border: 1px solid #16181f;
            padding: 15px; margin-bottom: 30px; 
        }
        .label-tiny { 
            font-family: 'JetBrains Mono', monospace; font-size: 9px; 
            color: #444; text-transform: uppercase; margin-bottom: 8px;
        }
        .address-text { 
            font-family: 'JetBrains Mono', monospace; font-size: 11px; 
            color: #8FA3B0; word-break: break-all; 
        }

        /* Inputs Estilo Terminal */
        .input-group { margin-bottom: 30px; }
        .input-group label { 
            display: block; font-family: 'JetBrains Mono', monospace; 
            font-size: 10px; color: #50AF95; margin-bottom: 12px; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input { 
            width: 100%; background: transparent; border: none; 
            border-bottom: 1px solid #1e2029; color: #fff; 
            font-family: 'JetBrains Mono', monospace; font-size: 14px; 
            padding: 10px 0; outline: none; transition: 0.3s;
        }
        .input-wrapper input:focus { border-bottom-color: #50AF95; }
        .currency-tag { 
            font-family: 'JetBrains Mono', monospace; font-size: 12px; 
            color: #50AF95; font-weight: 700; margin-left: 10px;
        }

        .btn-execute { 
            width: 100%; background: transparent; border: 1px solid #50AF95; 
            color: #50AF95; font-family: 'JetBrains Mono', monospace; 
            font-size: 12px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 2px; padding: 20px; cursor: pointer; 
            transition: 0.3s; margin-top: 10px;
        }
        .btn-execute:hover { 
            background: rgba(80, 175, 149, 0.1); 
            box-shadow: 0 0 20px rgba(80, 175, 149, 0.1); color: #fff;
        }

        .flash-msg { 
            font-family: 'JetBrains Mono', monospace; font-size: 11px; 
            color: #ff4c4c; background: rgba(255,76,76,0.05); 
            padding: 12px; border-left: 2px solid #ff4c4c; margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="transfer-wrapper">
        <div class="system-status">
            <div class="status-indicator"><div class="status-dot"></div> Tx-Protocol: Active</div>
            <div>Enc: AES-256</div>
        </div>

        <div class="module-card">
            <div class="header-box">
                <a href="/dashboard" class="btn-back"> < </a>
                <h1>TX_TRANSFER_USDT</h1>
            </div>

            <div class="source-info">
                <div class="label-tiny">Source_Address_Identifier</div>
                <div class="address-text">{{ endereco }}</div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash-msg">SYS_MSG: {{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/transferir" method="POST">
                <div class="input-group">
                    <label>Destination_Node (Address)</label>
                    <div class="input-wrapper">
                        <input type="text" name="destino" placeholder="0x..." required autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label>Volume_to_Broadcast (Amount)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.000001" name="quantidade" placeholder="0.00" required>
                        <div class="currency-tag">USDT</div>
                    </div>
                </div>

                <button type="submit" class="btn-execute">Execute_Broadcast</button>
            </form>
        </div>
    </div>
</body>
</html>
