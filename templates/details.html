<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Comprovante - Black Wallet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0c; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .receipt-card { background: #121318; width: 400px; border-radius: 24px; border: 1px solid #2a2d3a; padding: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center; }
        .status-badge { background: rgba(80, 175, 149, 0.1); color: #50AF95; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        h1 { font-size: 24px; margin: 25px 0 10px 0; color: #fff; }
        .sub-text { color: #8FA3B0; font-size: 14px; margin-bottom: 30px; }
        .detail-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #1e2029; font-size: 14px; }
        .detail-row:last-child { border-bottom: none; }
        .label { color: #666; }
        .value { color: #fff; font-weight: 500; word-break: break-all; text-align: right; max-width: 200px; }
        .btn-back { display: block; margin-top: 35px; color: #50AF95; text-decoration: none; font-weight: 600; font-size: 14px; }
        .btn-back:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="receipt-card">
        <span class="status-badge">Concluído</span>
        <h1>Detalhes da Transação</h1>
        <p class="sub-text">Transferência Interna Blockchain</p>

        <div class="detail-row">
            <span class="label">ID da Transação</span>
            <span class="value">{{ tx.tx_hash }}</span>
        </div>
        <div class="detail-row">
            <span class="label">Tipo</span>
            <span class="value">{{ tx.type }}</span>
        </div>
        <div class="detail-row">
            <span class="label">Valor</span>
            <span class="value">{{ tx.amount }} USDT</span>
        </div>
        <div class="detail-row">
            <span class="label">Destino</span>
            <span class="value">{{ tx.to_address }}</span>
        </div>
        
        <a href="/dashboard" class="btn-back">← Voltar para a Carteira</a>
    </div>
</body>
</html>
