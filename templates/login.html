<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE ACCESS - BLACK WALLET</title>
    <style>
        /* Importamos fontes estilo Terminal e Sans-serif limpa */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body { 
            background-color: #000000; /* Preto puro OLED */
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* Efeito de grade muito subtil no fundo */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(25, 27, 33, 0.3) 1px, transparent 1px),
            linear-gradient(90deg, rgba(25, 27, 33, 0.3) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .login-wrapper { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        
        /* Indicador de Status do Sistema */
        .system-status { 
            display: flex; align-items: center; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 10px; color: #50AF95; 
            text-transform: uppercase; letter-spacing: 2px; 
            margin-bottom: 25px; 
            opacity: 0.8;
        }
        .status-dot { 
            width: 8px; height: 8px; 
            background-color: #50AF95; 
            border-radius: 50%; margin-right: 12px; 
            box-shadow: 0 0 10px #50AF95; 
            animation: blink 2s infinite; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .login-card { 
            background: #050507; 
            border: 1px solid #16181f; 
            padding: 45px 35px; 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,1);
        }

        /* Linha verde de scanner no topo do cartão */
        .login-card::before { 
            content: ''; position: absolute; top: 0; left: 0; 
            width: 100%; height: 2px; 
            background: linear-gradient(90deg, transparent, #50AF95, transparent); 
        }

        h1 { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 22px; font-weight: 700; margin: 0 0 8px 0; 
            letter-spacing: 1px; color: #fff;
        }
        h1 span { color: #50AF95; }
        
        .subtitle { 
            color: #666; font-size: 11px; 
            font-family: 'JetBrains Mono', monospace; 
            text-transform: uppercase; letter-spacing: 1px; 
            margin-bottom: 40px; 
        }

        .input-group { margin-bottom: 30px; text-align: left; position: relative; }
        .input-group label { 
            display: block; font-family: 'JetBrains Mono', monospace; 
            font-size: 10px; color: #6e7a85; margin-bottom: 10px; 
            text-transform: uppercase; letter-spacing: 1.5px; 
        }
        
        /* Inputs sem bordas, parecem linhas de comando */
        .input-group input { 
            width: 100%; background: transparent; 
            border: none; border-bottom: 1px solid #1e2029; 
            color: #fff; font-size: 16px; padding: 5px 0 10px 0; 
            font-family: 'JetBrains Mono', monospace; 
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-bottom-color: #50AF95; color: #50AF95; }
        .input-group input::placeholder { color: #222; }

        .btn-submit { 
            width: 100%; background: transparent; 
            border: 1px solid #50AF95; color: #50AF95; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 12px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 3px; 
            padding: 18px; cursor: pointer; transition: 0.3s; 
            margin-top: 20px; position: relative; overflow: hidden;
        }
        .btn-submit:hover { 
            background: rgba(80, 175, 149, 0.1); 
            box-shadow: 0 0 20px rgba(80, 175, 149, 0.15); 
            color: #fff;
        }

        /* Mensagens de erro com aspecto de terminal */
        .flash-msg { 
            font-family: 'JetBrains Mono', monospace; font-size: 11px; 
            color: #ff4c4c; border-left: 2px solid #ff4c4c; 
            background: rgba(255, 76, 76, 0.05); padding: 12px; 
            margin-bottom: 25px; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="system-status">
            <div class="status-dot"></div> Node: Connected & SECURED
        </div>
        
        <div class="login-card">
            <h1>BLACK<span>WALLET</span></h1>
            <div class="subtitle">Cold Storage Auth Module v2.1</div>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-msg">ERR: {{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="input-group">
                    <label>Wallet Identifier</label>
                    <input type="text" name="username" placeholder="Enter ID" required autocomplete="off" spellcheck="false">
                </div>
                <div class="input-group">
                    <label>Decryption Key</label>
                    <input type="password" name="password" placeholder="••••••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Decrypt Wallet</button>
            </form>
        </div>
    </div>
</body>
</html>
